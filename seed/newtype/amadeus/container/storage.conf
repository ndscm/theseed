# Rootless storage configuration for the amadeus user.
#
# This lives at ~/.config/containers/storage.conf, not /etc, on purpose. Unlike
# containers.conf, storage.conf is NOT merged across its search path:
# containers/storage loads the single highest-precedence file and ignores the
# rest. The base image ships a system storage.conf (/usr/containers or
# /etc/containers) that would shadow ours, so the amadeus user carries its own
# copy in $HOME/.config -- the highest-precedence location for a rootless user --
# to be sure these options actually take effect.

[storage]
driver = "overlay"

[storage.options]
# Read-only playpen image store, prepopulated by root during the image build (see
# the podman load in the Containerfile). amadeus reads its layers through
# fuse-overlayfs configured below.
additionalimagestores = [
  "/usr/local/share/containers/storage",
]

[storage.options.overlay]
# Nested rootless podman can't perform a real kernel overlay mount, and the
# additional store's layers are owned by host root (outside amadeus's subuid
# range), so everything is mounted through fuse-overlayfs. It runs in userspace
# and presents each layer's original permissions -- stashed in a
# user.containers.override_stat xattr by force_mask=shared at load time -- back to
# amadeus as readable.
mount_program = "/usr/bin/fuse-overlayfs"
mountopt = "nodev,fsync=0"
