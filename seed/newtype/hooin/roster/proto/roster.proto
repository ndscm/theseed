syntax = "proto3";

package seed.newtype.hooin.roster.proto;

option go_package = "github.com/ndscm/theseed/seed/newtype/hooin/roster/proto/rosterpb";

message Team {
  string team_uuid = 1;
  string handle = 2;
  string display_name = 3;
}

message GetTeamRequest {}

message GetTeamMemberRequest {
  string person_id = 1;
  string handle = 2;
}

message TeamMember {
  string team_uuid = 1;
  string person_id = 2;
  string handle = 3;
  string display_name = 4;
  string organic = 6;

  bool on_duty = 5;
}

message ListTeamMembersRequest {}

message ListTeamMembersResponse {
  repeated TeamMember team_members = 1;
}

service HooinRosterService {
  rpc GetTeam(GetTeamRequest) returns (Team) {}

  rpc GetTeamMember(GetTeamMemberRequest) returns (TeamMember) {}

  rpc ListTeamMembers(ListTeamMembersRequest)
      returns (ListTeamMembersResponse) {}
}
