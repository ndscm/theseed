server {
    listen 22243 default_server;
    server_name cache.rbe.ndscm.com;

    access_log /var/log/nginx/rbe-cache.access.log main;

    location / {
        root /var/www;
        dav_methods PUT;
        # Allow nginx to create the /ac and /cas subdirectories.
        create_full_put_path on;
        # The maximum size of a single file.
        client_max_body_size 1G;
        allow all;
    }
}
