# Subversion served over HTTP(S) via mod_dav_svn.
#
# Repositories live under SVNParentPath; each subdirectory is an
# independent repository accessible at /repos/<name>.
#
# The listener uses ${SVN_HTTPD_PORT} for both HTTP and HTTPS. TLS is enabled
# only when the SVN_HTTPS define is passed (entrypoint.sh sets it from
# the SVN_HTTPS environment variable and generates a self-signed cert);
# otherwise the same vhost serves plain HTTP.

<VirtualHost *:${SVN_HTTPD_PORT}>
    ServerName ${SVN_SERVER_NAME}

    # Log to the container's stdout/stderr so `podman logs` works.
    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined

    <IfDefine SVN_HTTPS>
        SSLEngine on
        SSLCertificateFile ${SVN_SSL_CERT_FILE}
        SSLCertificateKeyFile ${SVN_SSL_KEY_FILE}
    </IfDefine>

    <Location /repos>
        DAV svn
        SVNParentPath ${SVN_PARENT_PATH}
        SVNListParentPath On

        AuthType Basic
        AuthName "Subversion Repositories"
        AuthUserFile ${SVN_AUTH_USER_FILE}
        AuthzSVNAccessFile ${SVN_AUTHZ_FILE}
        Require valid-user
    </Location>
</VirtualHost>
